version: "3.8"

services:
  app:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VISION_MODEL=${VISION_MODEL:-google/gemini-2.0-flash-lite}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
